---
layout: default
---

<div class="post-wrapper">
    <a href="/blog.html" class="back-to-blog"><i class="fas fa-arrow-left"></i> Back to Blog</a>

    <div class="post-header">
        <p class="post-meta">
            <span class="post-category">{{ page.category }}</span>
            &nbsp;·&nbsp;
            {{ page.date | date: "%B %d, %Y" }}
        </p>
        <h1>{{ page.title }}</h1>
    </div>

    {% if page.image %}
    <img class="post-cover" src="{{ page.image }}" alt="{{ page.title }}" />
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>

    <div class="share-bar">
        <span>Share:</span>
        <a href="https://wa.me/?text={{ page.title | url_encode }}%20https://fareengems.com{{ page.url | url_encode }}" target="_blank" aria-label="Share on WhatsApp"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.facebook.com/sharer/sharer.php?u=https://fareengems.com{{ page.url | url_encode }}" target="_blank" aria-label="Share on Facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/fareengems/" target="_blank" aria-label="Follow on Instagram"><i class="fab fa-instagram"></i></a>
    </div>
</div>
